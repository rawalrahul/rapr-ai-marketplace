name: Sync Viral Shorts

on:
  workflow_dispatch:
    inputs:
      ref:
        description: Branch to sync from rawalrahul/viral-shorts-skill
        required: false
        default: main
  repository_dispatch:
    types:
      - viral-shorts-updated
  schedule:
    - cron: '17 */6 * * *'

permissions:
  contents: write

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - name: Sync package
        env:
          VIRAL_SHORTS_SKILL_REF: ${{ github.event.client_payload.ref || github.event.inputs.ref || 'main' }}
        run: python scripts/sync_viral_shorts.py
      - name: Validate marketplace
        run: python scripts/validate_marketplace.py
      - name: Commit updates
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: Sync viral-shorts package from source repo
          file_pattern: catalog.json packages/viral-shorts-*.raprpkg
